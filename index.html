<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">

  <title>Datos de Transferencia - Print Balls</title>
  <link rel="icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f1f5f9;
      background-image: 
        url("https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"),
        url("https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png");
      background-size: 55px 55px, 55px 55px;
      background-position: 0 0, 28px 28px;
      background-repeat: repeat, repeat;
      color: #1e293b;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .wrapper { 
      width: 100%; 
      max-width: 480px; 
      position: relative; 
      z-index: 2; 
    }

    .card-base {
      background-color: rgba(255, 255, 255, 0.10) !important; /* 90% de transparencia (10% de opacidad) */
      backdrop-filter: blur(18px) !important;
      -webkit-backdrop-filter: blur(18px) !important;
      padding: 35px 28px;
      border-radius: 24px;
      box-shadow: 0 20px 40px -15px rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.4);
      width: 100%;
      text-align: center;
      position: relative;
    }

    .card-base::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #dc2626 0%, #ef4444 100%);
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
    }

    .subtitulo-principal {
      font-size: 1.25rem;
      color: #b91c1c;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: -0.3px;
    }

    .logo-contenedor {
      margin-bottom: 20px;
    }

    .logo-img {
      max-height: 70px;
      width: auto;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
      filter: drop-shadow(0 4px 6px rgba(220, 38, 38, 0.15));
    }

    .contenedor-tarjetas {
      display: flex;
      flex-direction: column;
      margin-bottom: 22px;
      margin-top: 10px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-left: 4px solid #dc2626;
      border-radius: 12px;
      overflow: hidden;
      background-color: rgba(255, 255, 255, 0.05) !important;
      text-align: left;
    }

    .tarjeta {
      background-color: transparent !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding: 12px 18px;
      display: flex;
      flex-direction: column;
    }

    .tarjeta:last-child { border-bottom: none; }

    .etiqueta {
      font-size: 0.7rem;
      color: #334155;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .valor {
      font-size: 0.95rem;
      color: #0f172a;
      font-weight: 600;
      word-break: break-all;
    }

    .btn-copiar {
      width: 100%;
      background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
      color: #ffffff;
      border: none;
      padding: 15px;
      border-radius: 14px;
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px rgba(220, 38, 38, 0.3);
    }

    .btn-copiar:hover {
      background: linear-gradient(135deg, #b91c1c 0%, #991b1b 100%);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(220, 38, 38, 0.4);
    }

    .btn-copiar:active {
      transform: translateY(0);
    }

    .mensaje {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      color: #ffffff;
      background-color: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(4px);
      padding: 16px 26px;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="card-base">
      <p class="subtitulo-principal">Print Balls</p>

      <div class="logo-contenedor">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="Print Balls" class="logo-img">
      </div>

      <div class="contenedor-tarjetas">
        <div class="tarjeta"><span class="etiqueta">Titular / Razón Social:</span><span class="valor">Print Balls</span></div>
        <div class="tarjeta"><span class="etiqueta">RUT:</span><span class="valor">18.145.926-3</span></div>
        <div class="tarjeta"><span class="etiqueta">Banco:</span><span class="valor">Banco Santander</span></div>
        <div class="tarjeta"><span class="etiqueta">Tipo de Cuenta:</span><span class="valor">Cuenta Corriente</span></div>
        <div class="tarjeta"><span class="etiqueta">Número de Cuenta:</span><span class="valor">4406124110535770</span></div>
        <div class="tarjeta"><span class="etiqueta">Correo:</span><span class="valor">Print.balls@gmail.com</span></div>
      </div>

      <button class="btn-copiar" onclick="copiarDatos()">Copiar datos de transferencia</button>
    </div>
  </div>

  <div id="mensaje-flotante" class="mensaje">✓ Datos copiados al portapapeles</div>

  <script src="script.js?v=10"></script>
</body>
</html>
