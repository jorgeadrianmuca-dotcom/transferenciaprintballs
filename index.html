<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">

  <title>Datos de Transferencia - Print Balls</title>
  <link rel="icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Press Start 2P', monospace;
      background-color: #ffccd5;
      /* Definimos un espaciado de repetición amplio y controlado para que no se amontonen */
      background-image: 
        url("https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"),
        url("https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png");
      background-size: 48px 48px, 48px 48px;
      background-position: 0 0, 96px 96px;
      background-repeat: repeat, repeat;
      color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .wrapper { 
      width: 100%; 
      max-width: 460px; 
      position: relative; 
      z-index: 2; 
      text-align: center;
    }

    .subtitulo-principal {
      font-size: 0.85rem;
      color: #000000;
      background-color: #ffffff;
      border: 4px solid #000000;
      padding: 12px;
      margin-bottom: 20px;
      text-transform: uppercase;
      box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.8);
    }

    .logo-contenedor {
      margin-bottom: 20px;
    }

    .logo-img {
      max-height: 64px;
      width: auto;
      object-fit: contain;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: drop-shadow(4px 4px 0px rgba(0, 0, 0, 0.5));
    }

    .contenedor-tarjetas {
      display: flex;
      flex-direction: column;
      margin-bottom: 25px;
      background-color: #ffffff;
      border: 4px solid #000000;
      overflow: hidden;
      box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.8);
      text-align: left;
    }

    .tarjeta {
      background-color: #ffffff;
      border-bottom: 4px solid #000000;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tarjeta:last-child { border-bottom: none; }

    .etiqueta {
      font-size: 0.5rem;
      color: #555555;
      text-transform: uppercase;
    }

    .valor {
      font-size: 0.62rem;
      color: #000000;
      text-transform: uppercase;
      word-break: break-all;
      line-height: 1.4;
    }

    .btn-copiar {
      width: 100%;
      background-color: #000000;
      font-family: 'Press Start 2P', monospace;
      color: #ffffff;
      border: 4px solid #000000;
      padding: 18px 16px;
      font-size: 0.58rem;
      line-height: 1.6;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.5);
      transition: all 0.1s ease;
      text-align: center;
    }

    .btn-copiar:hover {
      background-color: #222222;
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.6);
    }

    .btn-copiar:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.6);
    }

    .mensaje {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      color: #000000;
      background-color: #ffffff;
      font-family: 'Press Start 2P', monospace;
      border: 4px solid #000000;
      padding: 16px 20px;
      font-size: 0.6rem;
      line-height: 1.5;
      box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.8);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="subtitulo-principal">Print Balls</div>

    <div class="logo-contenedor">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="Print Balls" class="logo-img">
    </div>

    <div class="contenedor-tarjetas">
      <div class="tarjeta"><span class="etiqueta">Titular / Razón Social:</span><span class="valor">Print Balls</span></div>
      <div class="tarjeta"><span class="etiqueta">RUT:</span><span class="valor">18.145.926-3</span></div>
      <div class="tarjeta"><span class="etiqueta">Banco:</span><span class="valor">Banco Santander</span></div>
      <div class="tarjeta"><span class="etiqueta">Tipo de Cuenta:</span><span class="valor">Cuenta Corriente</span></div>
      <div class="tarjeta"><span class="etiqueta">Número de Cuenta:</span><span class="valor">4406124110535770</span></div>
      <div class="tarjeta"><span class="etiqueta">Correo:</span><span class="valor">Print.balls@gmail.com</span></div>
    </div>

    <button class="btn-copiar" onclick="copiarDatos()">
      ▶ Copiar datos
    </button>
  </div>

  <div id="mensaje-flotante" class="mensaje">¡Datos copiados!</div>

  <script src="script.js?v=20"></script>
</body>
</html>
