<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">

  <title>Datos de Transferencia - Print Balls</title>
  <link rel="icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #ffffff;
      background-image: 
        url("https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"),
        url("https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png");
      background-size: 55px 55px, 55px 55px;
      background-position: 0 0, 28px 28px;
      background-repeat: repeat, repeat;
      color: #1e293b;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .wrapper { 
      width: 100%; 
      max-width: 440px; 
      position: relative; 
      z-index: 2; 
      text-align: center;
    }

    .subtitulo-principal {
      font-size: 1.5rem;
      color: #b91c1c;
      font-weight: 700;
      margin-bottom: 15px;
      letter-spacing: -0.3px;
      text-shadow: 0 2px 4px rgba(255, 255, 255, 0.8);
    }

    .logo-contenedor {
      margin-bottom: 20px;
    }

    .logo-img {
      max-height: 70px;
      width: auto;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
      filter: drop-shadow(0 4px 6px rgba(220, 38, 38, 0.2));
    }

    .contenedor-tarjetas {
      display: flex;
      flex-direction: column;
      margin-bottom: 25px;
      background-color: #ffffff;
      border: 1px solid #cbd5e1;
      border-left: 5px solid #dc2626;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      text-align: left;
    }

    .tarjeta {
      background-color: #ffffff;
      border-bottom: 1px solid #f1f5f9;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
    }

    .tarjeta:last-child { border-bottom: none; }

    .etiqueta {
      font-size: 0.7rem;
      color: #64748b;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .valor {
      font-size: 0.98rem;
      color: #0f172a;
      font-weight: 600;
      word-break: break-all;
    }

    /* ESTILO PLACA IDENTIFICADORA POKÉMON */
    .btn-copiar {
      width: 100%;
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      color: #ffffff;
      border: 3px solid #e2e8f0;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.25), inset 0 2px 4px rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    /* Insignia izquierda tipo nivel/icono */
    .placa-badge {
      background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
      color: #ffffff;
      font-weight: 800;
      font-size: 0.85rem;
      padding: 4px 10px;
      border-radius: 8px;
      border: 2px solid #fef3c7;
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .placa-badge img {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .placa-texto {
      letter-spacing: 0.3px;
      text-transform: uppercase;
      font-size: 0.88rem;
      background: linear-gradient(90deg, #ffffff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-copiar:hover {
      transform: translateY(-2px);
      border-color: #fbbf24;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.35);
    }

    .btn-copiar:active {
      transform: translateY(0);
    }

    .mensaje {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      color: #ffffff;
      background-color: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(4px);
      padding: 16px 26px;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <p class="subtitulo-principal">Print Balls</p>

    <div class="logo-contenedor">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="Print Balls" class="logo-img">
    </div>

    <div class="contenedor-tarjetas">
      <div class="tarjeta"><span class="etiqueta">Titular / Razón Social:</span><span class="valor">Print Balls</span></div>
      <div class="tarjeta"><span class="etiqueta">RUT:</span><span class="valor">18.145.926-3</span></div>
      <div class="tarjeta"><span class="etiqueta">Banco:</span><span class="valor">Banco Santander</span></div>
      <div class="tarjeta"><span class="etiqueta">Tipo de Cuenta:</span><span class="valor">Cuenta Corriente</span></div>
      <div class="tarjeta"><span class="etiqueta">Número de Cuenta:</span><span class="valor">4406124110535770</span></div>
      <div class="tarjeta"><span class="etiqueta">Correo:</span><span class="valor">Print.balls@gmail.com</span></div>
    </div>

    <button class="btn-copiar" onclick="copiarDatos()">
      <div class="placa-badge">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="Ball">
        <span>VIP</span>
      </div>
      <span class="placa-texto">Copiar datos de transferencia</span>
    </button>
  </div>

  <div id="mensaje-flotante" class="mensaje">✓ Datos copiados al portapapeles</div>

  <script src="script.js?v=14"></script>
</body>
</html>
